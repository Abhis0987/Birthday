<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baacha ❤️</title>

<link rel="stylesheet" href="style.css?v=4">
</head>

<body>

<!-- START SCREEN -->
<div id="start" class="center start">
  <h1>🎂 24th Birthday Surprise 🎂</h1>
  <p id="countdown"></p>
  <button onclick="startExperience()" class="btn">Tap to unlock 😏</button>
</div>

<!-- TEXT -->
<div id="text" class="text hidden"></div>

<!-- ALBUM -->
<div id="album" class="hidden album">
  <h2>Our Memories ❤️</h2>
  <div class="gallery">
    <img src="assets/img1.jpg" onclick="openImg(this.src)">
    <img src="assets/img2.jpg" onclick="openImg(this.src)">
    <img src="assets/img3.jpg" onclick="openImg(this.src)">
  </div>
</div>

<!-- FULL IMAGE VIEW -->
<div id="viewer" class="viewer hidden" onclick="closeImg()">
  <img id="fullImg">
</div>

<!-- SCRIPT (IMPORTANT: defer added) -->
<script src="script.js?v=4" defer></script>

</body>
</html>
