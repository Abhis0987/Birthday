<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baacha ❤️</title>

<link rel="stylesheet" href="style.css?v=5">
</head>

<body>

<!-- Decorations -->
<div id="decorations"></div>

<!-- START -->
<div id="start" class="center">
  <h1>🎂 24th Birthday Surprise 🎂</h1>
  <p id="countdown"></p>
  <button onclick="startExperience()" class="btn">Tap to unlock 😏</button>
</div>

<!-- CAKE -->
<div id="cakeBox" class="center hidden">
  <div id="cake" onclick="cutCake()">🎂</div>
  <p>Cut the cake 🎉</p>
</div>

<!-- TEXT -->
<div id="text" class="text hidden"></div>

<!-- ALBUM -->
<div id="album" class="hidden album">
  <h2>Our Memories ❤️</h2>
  <div class="gallery">
    <img src="img1.jpg" onclick="openImg(this.src)">
    <img src="img2.jpg" onclick="openImg(this.src)">
    <img src="img3.jpg" onclick="openImg(this.src)">
  </div>
</div>

<!-- VIEWER -->
<div id="viewer" class="viewer hidden" onclick="closeImg()">
  <img id="fullImg">
</div>

<script src="script.js?v=5" defer></script>

</body>
</html>
